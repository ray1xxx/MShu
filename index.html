var na=result.四柱纳音;var 纳音五行={金:["海中金","剑锋金","白蜡金","沙中金","金箔金","钗钏金"],木:["大林木","杨柳木","松柏木","平地木","桑柘木","石榴木"],水:["涧下水","泉中水","长流水","天河水","大溪水","大海水"],火:["炉中火","山头火","霹雳火","山下火","覆灯火","天上火"],土:["路旁土","城头土","屋上土","壁上土","大驿土","沙中土"]};
var getWx=function(n){for(var k in 纳音五行){if(纳音五行[k].indexOf(n)>=0)return k}return"?"};var seq=na.map(function(n){return getWx(n)});
return{name:"⑤ 纳音法（纳音论命）",basis:"年"+na[0]+"→月"+na[1]+"→日"+na[2]+"→时"+na[3]+" 走势："+seq.join("→"),content:"【纳音走势】"+seq[0]+"→"+seq[1]+"→"+seq[2]+"→"+seq[3]+(seq[0]===seq[3]?"。金始金终，晚年有成。":"。起伏变化，阅历丰富。")};
}
};
var cr=null;
var BE=BaziEngine;
var FS=FiveSchools;
document.getElementById("tabContainer").addEventListener("click",function(e){
if(e.target.classList.contains("tab-btn")){
document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.remove("active")});
document.querySelectorAll(".panel").forEach(function(p){p.classList.remove("active")});
e.target.classList.add("active");
document.getElementById("panel-"+e.target.getAttribute("data-tab")).classList.add("active");
}
});
function computeBazi(){
var n=document.getElementById("inputName").value||"未知";
var g=document.getElementById("inputGender").value;
var y=parseInt(document.getElementById("inputYear").value);
var m=parseInt(document.getElementById("inputMonth").value);
var d=parseInt(document.getElementById("inputDay").value);
var h=parseInt(document.getElementById("inputHour").value);
var p=document.getElementById("inputPlace").value;
var r=BE.排盘({year:y,month:m,day:d,hour:h,gender:g,place:p});
cr={name:n,gender:g,year:y,month:m,day:d,hour:h,place:p};
for(var k in r)cr[k]=r[k];
renderBazi();
renderAnalysis();
var btn=document.querySelector('[data-tab="result"]');if(btn)btn.click();
}
document.getElementById("btnGo").addEventListener("click",computeBazi);
document.getElementById("btnTarot").addEventListener("click",function(){alert("塔罗模块待接入");});
function renderBazi(){
if(!cr||!cr.八字)return;
var b=cr.八字;var cs=["年","月","日","时"];var gz=[b.年,b.月,b.日,b.时];
var sh=[cr.十神.年干,cr.十神.月干,"日主",cr.十神.时干];var ny=cr.四柱纳音;
var x="<h2 style=\"color:#d4a853\">"+cr.name+" · "+cr.gender+"命</h2>";
x+="<p style=\"color:#5c5c7a;margin-bottom:12px\">"+cr.year+"年"+cr.month+"月"+cr.day+"日 · "+cr.place+"</p>";
x+="<div class=\"bazi-display\">";
for(var i=0;i<4;i++){x+="<div class=\"bazi-col\"><div class=\"gan\">"+gz[i].干+"</div><div class=\"zhi\">"+gz[i].支+"</div><div class=\"shen\">"+sh[i]+"</div><div class=\"label\">"+cs[i]+"柱</div><div class=\"nayin\">"+ny[i]+"</div></div>"}
x+="</div>";
x+="<div style=\"text-align:center;margin:12px 0;padding:10px;background:#1e1e36;border-radius:6px\"><span style=\"color:#8b7d6b\">日主：</span><span style=\"color:#e8b85f;font-size:1.3em;font-weight:bold\">"+cr.日主+cr.日主五行+"</span>";
var wx=BE.五行旺衰(b);var tw=0;for(var k in wx)tw+=wx[k];
for(var k in wx){x+=" <span style=\"margin:0 4px\"><b>"+k+"</b>"+Math.round(wx[k]/tw*100)+"%</span>"}
x+="</div>";
x+="<h3 style=\"color:#d4a853;margin:16px 0 8px\">🌊 大运</h3><p style=\"color:#5c5c7a\">"+cr.大运.起运年龄+"岁起运</p>";
x+="<table class=\"result-table\"><tr><th>大运</th><th>年龄</th></tr>";
for(var i=0;i<cr.大运.大运.length;i++){x+="<tr><td style=\"color:#e8b85f;font-weight:bold\">"+cr.大运.大运[i].干支+"</td><td>"+cr.大运.大运[i].年龄段+"</td></tr>"}
x+="</table>";
x+="<h3 style=\"color:#d4a853;margin:16px 0 8px\">📅 当前流年</h3><p>"+cr.流年.干支+" · "+cr.流年.生肖+"年 · "+cr.流年.十神+" · "+cr.流年.纳音+"</p>";
x+="<h3 style=\"color:#d4a853;margin:16px 0 8px\">📦 地支藏干</h3><table class=\"result-table\"><tr><th>地支</th><th>藏干</th></tr>";
for(var z in cr.藏干十神){x+="<tr><td style=\"color:#7ec8e3;font-weight:bold\">"+z+"</td><td>";for(var j=0;j<cr.藏干十神[z].length;j++){x+=cr.藏干十神[z][j].干+"("+cr.藏干十神[z][j].十神+") "}x+="</td></tr>"}
x+="</table>";
document.getElementById("resultContent").innerHTML=x;
}
function renderAnalysis(){
if(!cr||!cr.八字)return;
var ss=FS.analyze(cr);var x="";
for(var i=0;i<ss.length;i++){
x+="<div class=\"school-box\"><h4>"+ss[i].name+"</h4><div class=\"basis\">"+ss[i].basis+"</div><p>"+ss[i].content+"</p></div>"
}
document.getElementById("analysisContent").innerHTML=x;
}
