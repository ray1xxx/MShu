<script>
var E={tg:["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"],dz:["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"],yy:{甲:"阳",乙:"阴",丙:"阳",丁:"阴",戊:"阳",己:"阴",庚:"阳",辛:"阴",壬:"阳",癸:"阴"},sx:{子:"鼠",丑:"牛",寅:"虎",卯:"兔",辰:"龙",巳:"蛇",午:"马",未:"羊",申:"猴",酉:"鸡",戌:"狗",亥:"猪"},tx:{甲:"木",乙:"木",丙:"火",丁:"火",戊:"土",己:"土",庚:"金",辛:"金",壬:"水",癸:"水"},dx:{子:"水",丑:"土",寅:"木",卯:"木",辰:"土",巳:"火",午:"火",未:"土",申:"金",酉:"金",戌:"土",亥:"水"},zg:{子:["癸"],丑:["己","癸","辛"],寅:["甲","丙","戊"],卯:["乙"],辰:["戊","乙","癸"],巳:["丙","庚","戊"],午:["丁","己"],未:["己","丁","乙"],申:["庚","壬","戊"],酉:["辛"],戌:["戊","辛","丁"],亥:["壬","甲"]},ny:{"甲子乙丑":"海中金","丙寅丁卯":"炉中火","戊辰己巳":"大林木","庚午辛未":"路旁土","壬申癸酉":"剑锋金","甲戌乙亥":"山头火","丙子丁丑":"涧下水","戊寅己卯":"城头土","庚辰辛巳":"白蜡金","壬午癸未":"杨柳木","甲申乙酉":"泉中水","丙戌丁亥":"屋上土","戊子己丑":"霹雳火","庚寅辛卯":"松柏木","壬辰癸巳":"长流水","甲午乙未":"沙中金","丙申丁酉":"山下火","戊戌己亥":"平地木","庚子辛丑":"壁上土","壬寅癸卯":"金箔金","甲辰乙巳":"覆灯火","丙午丁未":"天河水","戊申己酉":"大驿土","庚戌辛亥":"钗钏金","壬子癸丑":"桑柘木","甲寅乙卯":"大溪水","丙辰丁巳":"沙中土","戊午己未":"天上火","庚申辛酉":"石榴木","壬戌癸亥":"大海水"},lcr:{2001:4,2002:4,2003:4,2004:4,2005:4,2020:4,2021:3,2022:4,2023:4,2024:4,2025:3,2026:4,2027:4,2028:4,2029:3,2030:4,1977:4},yzb:{2:"寅",3:"卯",4:"辰",5:"巳",6:"午",7:"未",8:"申",9:"酉",10:"戌",11:"亥",12:"子",1:"丑"},jqr:{2:4,3:6,4:5,5:6,6:6,7:7,8:7,9:8,10:8,11:7,12:7,1:6}};

function rn(y,m,d){var diff=Math.round((new Date(y,m-1,d)-new Date(2000,0,1))/(24*3600*1000)),idx=((54+diff)%60+60)%60;return{g:E.tg[idx%10],z:E.dz[idx%12]}}

E.ss={比肩:["甲甲","乙乙","丙丙","丁丁","戊戊","己己","庚庚","辛辛","壬壬","癸癸"],劫财:["甲乙","乙甲","丙丁","丁丙","戊己","己戊","庚辛","辛庚","壬癸","癸壬"],食神:["甲丙","乙丁","丙戊","丁己","戊庚","己辛","庚壬","辛癸","壬甲","癸乙"],伤官:["甲丁","乙丙","丙己","丁戊","戊辛","己庚","庚癸","辛壬","壬乙","癸甲"],偏财:["甲戊","乙己","丙庚","丁辛","戊壬","己癸","庚甲","辛乙","壬丙","癸丁"],正财:["甲己","乙戊","丙辛","丁庚","戊癸","己壬","庚乙","辛甲","壬丁","癸丙"],偏官:["甲庚","乙辛","丙壬","丁癸","戊甲","己乙","庚丙","辛丁","壬戊","癸己"],正官:["甲辛","乙庚","丙癸","丁壬","戊乙","己甲","庚丁","辛丙","壬己","癸戊"],偏印:["甲壬","乙癸","丙甲","丁乙","戊丙","己丁","庚戊","辛己","壬庚","癸辛"],正印:["甲癸","乙壬","丙乙","丁甲","戊丁","己丙","庚己","辛戊","壬辛","庚癸"]};

function ly(yr,dG){var g=(yr-4)%10,z=(yr-4)%12,gz=E.tg[g]+E.dz[z];return{gz:gz,sx:E.sx[E.dz[z]],sh:sh(dG,E.tg[g]),ny:nn(gz)}}
function wx(w){var f={木:0,火:0,土:0,金:0,水:0},ps=[w.年,w.月,w.日,w.时];for(var i=0;i<ps.length;i++){var p=ps[i];f[E.tx[p.g]]+=2;f[E.dx[p.z]]+=2;var c=E.zg[p.z]||[];for(var j=0;j<c.length;j++)f[E.tx[c[j]]]+=1}return f}
